services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
    volumes:
      - ./config/prowlarr:/config
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
    volumes:
      - ./config/sonarr:/config
      - /media/jellyfin:/data
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
    volumes:
      - ./config/radarr:/config
      - /media/jellyfin:/data
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
    volumes:
      - ./config/lidarr:/config
      - /media/jellyfin:/data
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
    volumes:
      - ./config/bazarr:/config
      - /media/jellyfin:/data
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    network_mode: host
    environment:
      - LOG_LEVEL=debug
      - TZ=Asia/Kolkata
      - PORT=5055
    volumes:
      - ./config/jellyseerr:/app/config
    restart: unless-stopped

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:latest
    container_name: recyclarr
    network_mode: host
    user: 1000:1000
    environment:
      - TZ=Asia/Kolkata
    volumes:
      - ./config/recyclarr:/config
    restart: unless-stopped

  autobrr:
    image: ghcr.io/autobrr/autobrr:latest
    container_name: autobrr
    network_mode: host
    environment:
      - TZ=Asia/Kolkata
    user: 1000:1000
    volumes:
      - ./config/autobrr:/config
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    network_mode: host
    environment:
      - LOG_LEVEL=info
      - TZ=Asia/Kolkata
    restart: unless-stopped

  readarr:
    image: linuxserver/readarr:0.4.19-nightly
    container_name: readarr
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
    volumes:
      - ./config/readarr:/config
      - /media/jellyfin:/data
    restart: unless-stopped

  kavita:
    image: jvmilazz0/kavita:latest
    container_name: kavita
    network_mode: host
    environment:
      - TZ=Asia/Kolkata
    volumes:
      - ./config/kavita:/kavita/config
      - /media/jellyfin/books:/books
    restart: unless-stopped

  unpackerr:
    image: golift/unpackerr:latest
    container_name: unpackerr
    network_mode: host
    user: 1000:1000
    environment:
      - TZ=Asia/Kolkata
      - UN_RADARR_0_URL=http://localhost:7878
      - UN_RADARR_0_API_KEY=${RADARR_API_KEY}
      - UN_SONARR_0_URL=http://localhost:8989
      - UN_SONARR_0_API_KEY=${SONARR_API_KEY}
      - UN_LIDARR_0_URL=http://localhost:8686
      - UN_LIDARR_0_API_KEY=${LIDARR_API_KEY}
      - UN_READARR_0_URL=http://localhost:8787
      - UN_READARR_0_API_KEY=${READARR_API_KEY}
    volumes:
      - /media/jellyfin:/data
    restart: unless-stopped

  jellystat:
    image: cyfershepard/jellystat:latest
    container_name: jellystat
    ports:
      - "3001:3000"
    environment:
      - TZ=Asia/Kolkata
      - POSTGRES_USER=jellystat
      - POSTGRES_PASSWORD=jellystat_pass
      - POSTGRES_IP=jellystat-db
      - POSTGRES_PORT=5432
      - JWT_SECRET=jellystat_jwt_secret_change_me
    volumes:
      - ./config/jellystat:/app/backend/backup-data
    depends_on:
      - jellystat-db
    restart: unless-stopped

  jellystat-db:
    image: postgres:15
    container_name: jellystat-db
    environment:
      - POSTGRES_DB=jfstat
      - POSTGRES_USER=jellystat
      - POSTGRES_PASSWORD=jellystat_pass
    volumes:
      - ./config/jellystat-db:/var/lib/postgresql/data
    restart: unless-stopped

  cross-seed:
    image: ghcr.io/cross-seed/cross-seed:latest
    container_name: cross-seed
    network_mode: host
    user: 1000:1000
    environment:
      - TZ=Asia/Kolkata
    volumes:
      - ./config/cross-seed:/config
      - /media/jellyfin:/data:ro
    command: daemon
    restart: unless-stopped
